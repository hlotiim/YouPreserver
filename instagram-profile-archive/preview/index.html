<!DOCTYPE html>

<html lang="en">

<head>

	<meta charset="UTF-8" />

	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="description" content="View Roktim Saha's Instagram photos on roktimsaha.com — the gallery archive for @roktimsaha. Browse archived posts, reels, captions, and story highlights preserved in a searchable Instagram profile gallery." />
	<title>Gallery (Photos of Roktim Saha)</title>

	<link rel="stylesheet" href="../assets/css/frontend.css" />

</head>

<body>

	<div class="ipa-instagram-archive ipa-width-fixed" style="--ipa-frame-width:390px;" data-offset="12" data-has-more="0">

		<div class="ipa-phone-frame">

			<header class="ipa-topbar ipa-topbar-sticky">

				<div class="ipa-topbar-inner">

					<button type="button" class="ipa-icon-btn ipa-topbar-back" aria-label="Back">

						<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>

					</button>

					<span class="ipa-topbar-username">@roktimsaha</span>

					<span class="ipa-topbar-spacer"></span>

				</div>

			</header>



			<section class="ipa-profile">

				<div class="ipa-profile-row">

					<div class="ipa-avatar-ring">

						<img src="" alt="RoKTiM SaHa" class="ipa-avatar" id="ipa-avatar" />

					</div>

				</div>

				<div class="ipa-profile-details">

					<p class="ipa-profile-username-desktop">@roktimsaha</p>

					<h1 class="ipa-display-name">RoKTiM SaHa</h1>

					<p class="ipa-category">Entrepreneur</p>

					<div class="ipa-bio">Founder <a href="https://www.instagram.com/vclar.ai/" class="ipa-bio-mention" target="_blank" rel="noopener">@vclar.ai</a><br><br>0.01% to be is to do.</div>

					<a href="https://roktimsaha.com" class="ipa-profile-link" target="_blank" rel="noopener">

						<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>

						<span>roktimsaha.com</span>

					</a>

				</div>

			</section>



			<section class="ipa-highlights" aria-label="Highlights">
				<div class="ipa-highlights-track" id="ipa-highlights-track"></div>
			</section>

			<section class="ipa-tabs" role="tablist" aria-label="Content filters">
				<button type="button" class="ipa-tab ipa-tab-active" data-filter="grid" role="tab" aria-selected="true">
					<svg class="ipa-tab-icon ipa-tab-icon-grid" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="5.5" height="5.5"/><rect x="9.25" y="3" width="5.5" height="5.5"/><rect x="15.5" y="3" width="5.5" height="5.5"/><rect x="3" y="9.25" width="5.5" height="5.5"/><rect x="9.25" y="9.25" width="5.5" height="5.5"/><rect x="15.5" y="9.25" width="5.5" height="5.5"/><rect x="3" y="15.5" width="5.5" height="5.5"/><rect x="9.25" y="15.5" width="5.5" height="5.5"/><rect x="15.5" y="15.5" width="5.5" height="5.5"/></svg>
				</button>
				<button type="button" class="ipa-tab" data-filter="reels" role="tab" aria-selected="false">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M10 8.5v7l6-3.5-6-3.5z" fill="currentColor" stroke="none"/></svg>
				</button>
			</section>

			<div class="ipa-content-area">
				<div class="ipa-grid" id="ipa-grid"></div>
				<footer class="ipa-site-credit">
					Built by <a href="https://roktimsaha.com" target="_blank" rel="noopener noreferrer">Roktim Saha</a>
				</footer>
			</div>

		</div>



		<div class="ipa-modal ipa-hidden" id="ipa-modal" role="dialog" aria-modal="true" aria-hidden="true">

			<div class="ipa-modal-backdrop" data-ipa-close></div>

			<div class="ipa-modal-panel">

				<header class="ipa-modal-header">

					<button type="button" class="ipa-icon-btn ipa-modal-close" data-ipa-close aria-label="Close"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>

					<span class="ipa-modal-title">@roktimsaha</span><span class="ipa-modal-spacer"></span>

				</header>

				<div class="ipa-modal-body">

					<button type="button" class="ipa-modal-nav ipa-modal-prev" id="ipa-modal-prev" aria-label="Previous"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>

					<div class="ipa-modal-media-wrap"><div class="ipa-modal-media" id="ipa-modal-media"></div><div class="ipa-modal-dots" id="ipa-modal-dots"></div></div>

					<button type="button" class="ipa-modal-nav ipa-modal-next" id="ipa-modal-next" aria-label="Next"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>

				</div>

				<footer class="ipa-modal-footer">

					<time class="ipa-modal-date" id="ipa-modal-date"></time>

					<p class="ipa-modal-caption" id="ipa-modal-caption"></p>

					<a href="#" class="ipa-modal-link" id="ipa-modal-link" target="_blank" rel="noopener">View original post</a>

				</footer>

			</div>

		</div>

		<script type="application/json" id="ipa-media-data"></script>
		<script type="application/json" id="ipa-highlights-data"></script>

	</div>



	<script>

		function placeholderSvg(color, label) {
			var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="360" height="480" viewBox="0 0 360 480"><defs><linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:' + color + '"/><stop offset="100%" style="stop-color:#262626;stop-opacity:0.75"/></linearGradient></defs><rect width="360" height="480" fill="url(#g)"/>' + (label ? '<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18">' + label + '</text>' : '') + '</svg>';
			return 'data:image/svg+xml;base64,' + btoa(svg);
		}



		var avatar = placeholderSvg('#F57600', 'R');

		document.getElementById('ipa-avatar').src = avatar;



		var colors = ['#F57600', '#E86800', '#FF9A2E', '#C95600', '#FFB366'];
		var mockMedia = colors.map(function(c, i) {
			var isCarousel = i >= 1 && i <= 3;
			return {
				media_type: isCarousel ? 'CAROUSEL_ALBUM' : 'IMAGE',
				caption: 'Post ' + (i + 1),
				permalink: '#',
				posted_at: '2026-05-' + (20 - i) + ' 12:00:00',
				mock_color: c,
				children: isCarousel ? [{ media_type: 'IMAGE', mock_color: '#F57600' }, { media_type: 'IMAGE', mock_color: '#F57600' }] : []
			};
		});

		var modalPayload = mockMedia.map(function(item, i) {
			var slides = [];
			if (item.children.length) {
				slides = item.children.map(function(c) {
					var u = placeholderSvg(c.mock_color, '');
					return { type: c.media_type, url: u, thumb: u };
				});
			} else {
				var u = placeholderSvg(item.mock_color, String(i + 1));
				slides = [{ type: item.media_type, url: u, thumb: u }];
			}
			return { caption: item.caption, permalink: item.permalink, posted_at: item.posted_at, slides: slides };
		});
		document.getElementById('ipa-media-data').textContent = JSON.stringify(modalPayload);

		var highlightLabels = ['Travel', 'Work', 'Life', 'World', 'Places'];
		var highlightsPayload = highlightLabels.map(function(label, index) {
			var color = colors[index % colors.length];
			var cover = placeholderSvg(color, '');
			var slide = placeholderSvg(color, String(index + 1));
			return {
				caption: label,
				permalink: '',
				posted_at: '',
				slides: [{ type: 'IMAGE', url: slide, thumb: cover }]
			};
		});
		document.getElementById('ipa-highlights-data').textContent = JSON.stringify(highlightsPayload);

		var highlightsTrack = document.getElementById('ipa-highlights-track');
		highlightLabels.forEach(function(label, index) {
			var color = colors[index % colors.length];
			var cover = placeholderSvg(color, '');
			var btn = document.createElement('button');
			btn.type = 'button';
			btn.className = 'ipa-highlight';
			btn.setAttribute('data-highlight-index', String(index));
			btn.innerHTML = '<div class="ipa-highlight-ring"><img src="' + cover + '" alt="" class="ipa-highlight-cover" loading="lazy"/></div><span class="ipa-highlight-label">' + label + '</span>';
			highlightsTrack.appendChild(btn);
		});

		var carouselIcon = '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M4.5 4.5h11v11h-11z" fill="none" stroke="currentColor" stroke-width="1.75"/><path d="M8.5 8.5h11v11h-11z"/></svg>';
		var pinIcon = '<svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor"><path d="M16 9V4h1c.6 0 1-.4 1-1s-.4-1-1-1H7c-.6 0-1 .4-1 1s.4 1 1 1h1v5c0 1.7-1.3 3-3 3v2h5.2v7l.8-.8.8.8v-7H19v-2c-1.7 0-3-1.3-3-3z"/></svg>';

		var grid = document.getElementById('ipa-grid');
		mockMedia.forEach(function(item, index) {
			var thumb = placeholderSvg(item.mock_color, '');
			var isCarousel = item.media_type === 'CAROUSEL_ALBUM';
			var pin = index === 0 ? '<span class="ipa-grid-overlay ipa-overlay-pin">' + pinIcon + '</span>' : '';
			var car = isCarousel ? '<span class="ipa-grid-overlay ipa-overlay-carousel">' + carouselIcon + '</span>' : '';
			var btn = document.createElement('button');
			btn.type = 'button';
			btn.className = 'ipa-grid-item ipa-filter-grid';
			btn.setAttribute('data-index', String(index));
			btn.innerHTML = '<img src="' + thumb + '" alt="" class="ipa-grid-thumb" loading="lazy"/>' + pin + car;
			grid.appendChild(btn);
		});

		window.ipaFrontend = {
			ajaxUrl: '',
			nonce: '',
			showCaptions: true,
			showDates: true,
			showInstagramLink: true,
			loadMoreText: 'Load more',
			loadingText: 'Loading…',
			closeLabel: 'Close',
			prevLabel: 'Previous',
			nextLabel: 'Next'
		};

	</script>

	<script src="../assets/js/frontend.js"></script>

</body>

</html>
